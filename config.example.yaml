plugins:
  enabled:
    - tool-result-compactor
platform_toolsets:
  cli:
    - terminal
    - context_compactor
context_compactor:
  enabled: true
  min_chars: 8000
  preview_chars: 1600
  retrieve_max_chars: 40000
  query_max_lines: 80
  ttl_seconds: 604800
  allow_unbounded_retention: false
  secure_delete: true
  private_store: true
  allow_full_retrieval: false
  max_records: 200
  max_store_chars: 2000000
